<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable - ProfCalendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F9FAFB; color: #1F2937; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-container { text-align: center; padding: 2rem; }
        .error-code { font-size: 8rem; font-weight: 800; color: #4F46E5; line-height: 1; opacity: 0.15; }
        .error-title { font-size: 1.8rem; font-weight: 700; margin: -1rem 0 0.75rem; }
        .error-text { color: #6B7280; font-size: 1.05rem; margin-bottom: 2rem; max-width: 400px; margin-left: auto; margin-right: auto; }
        .error-btn { display: inline-block; padding: 0.75rem 2rem; background: #4F46E5; color: white; border-radius: 0.5rem; text-decoration: none; font-weight: 600; transition: background 0.2s; }
        .error-btn:hover { background: #4338CA; }
        .error-links { margin-top: 1.5rem; }
        .error-links a { color: #6B7280; font-size: 0.9rem; margin: 0 0.5rem; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page introuvable</h1>
        <p class="error-text">La page que vous cherchez n'existe pas ou a ete deplacee.</p>
        <a href="/" class="error-btn">Retour a l'accueil</a>
        <div class="error-links">
            <a href="/auth/login">Se connecter</a>
            <a href="/auth/register">Creer un compte</a>
        </div>
    </div>
</body>
</html>
