{% extends "base.html" %}

{% block title %}Gestionnaire d'Exercices - ProfCalendar{% endblock %}

{% block extra_css %}
<style>
.manager-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem;
}

.manager-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    padding: 1.25rem 1.5rem;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.manager-header h1 {
    margin: 0;
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.manager-header h1 i { color: #667eea; }

.header-actions {
    display: flex;
    gap: 0.5rem;
}

.btn-primary {
    padding: 0.5rem 1rem;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    text-decoration: none;
    transition: background 0.2s;
}

.btn-primary:hover { background: #5a67d8; }

.btn-secondary {
    padding: 0.5rem 1rem;
    background: white;
    color: #374151;
    border: 2px solid #e5e7eb;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    transition: all 0.2s;
}

.btn-secondary:hover { border-color: #667eea; color: #667eea; }

/* Breadcrumb */
.breadcrumb-bar {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.75rem 1.5rem;
    background: white;
    border-radius: 12px;
    margin-bottom: 1rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    font-size: 0.9rem;
    flex-wrap: wrap;
}

.breadcrumb-item {
    cursor: pointer;
    color: #667eea;
    font-weight: 500;
    padding: 0.2rem 0.4rem;
    border-radius: 6px;
    transition: background 0.2s;
}

.breadcrumb-item:hover { background: #eef2ff; }

.breadcrumb-item.current { color: #374151; cursor: default; font-weight: 600; }
.breadcrumb-item.current:hover { background: none; }

.breadcrumb-sep { color: #9ca3af; font-size: 0.75rem; }

/* Content grid */
.content-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
}

/* Folder card */
.folder-card {
    background: white;
    border-radius: 12px;
    padding: 1.25rem;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid #e5e7eb;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    text-align: center;
    position: relative;
}

.folder-card:hover {
    border-color: #667eea;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
    transform: translateY(-2px);
}

.folder-icon {
    font-size: 2.5rem;
    color: var(--folder-color, #667eea);
}

.folder-name {
    font-weight: 600;
    font-size: 0.9rem;
    color: #374151;
    word-break: break-word;
}

.folder-actions {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    opacity: 0;
    transition: opacity 0.2s;
}

.folder-card:hover .folder-actions { opacity: 1; }

.folder-actions button {
    background: none;
    border: none;
    cursor: pointer;
    color: #9ca3af;
    font-size: 0.8rem;
    padding: 0.2rem;
}

.folder-actions button:hover { color: #667eea; }

/* Exercise card */
.exercise-card {
    background: white;
    border-radius: 12px;
    padding: 1.25rem;
    transition: all 0.2s;
    border: 2px solid #e5e7eb;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    position: relative;
}

.exercise-card:hover {
    border-color: #667eea;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
}

.exercise-icon {
    font-size: 1.5rem;
    color: #667eea;
    margin-bottom: 0.25rem;
}

.exercise-title {
    font-weight: 600;
    font-size: 0.9rem;
    color: #374151;
    word-break: break-word;
}

.exercise-meta {
    font-size: 0.75rem;
    color: #9ca3af;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.exercise-meta span {
    display: flex;
    align-items: center;
    gap: 0.2rem;
}

.exercise-badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
    font-size: 0.7rem;
    font-weight: 600;
}

.badge-published { background: #dcfce7; color: #16a34a; }
.badge-draft { background: #fef3c7; color: #d97706; }

.exercise-card-actions {
    display: flex;
    gap: 0.3rem;
    margin-top: auto;
    padding-top: 0.5rem;
    border-top: 1px solid #f3f4f6;
}

.exercise-card-actions a,
.exercise-card-actions button {
    flex: 1;
    padding: 0.35rem;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    background: white;
    color: #6b7280;
    cursor: pointer;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.2rem;
    text-decoration: none;
    transition: all 0.2s;
}

.exercise-card-actions a:hover,
.exercise-card-actions button:hover {
    border-color: #667eea;
    color: #667eea;
}

.exercise-card-actions .btn-danger:hover {
    border-color: #ef4444;
    color: #ef4444;
}

/* Empty state */
.empty-state {
    text-align: center;
    padding: 3rem;
    color: #9ca3af;
    grid-column: 1 / -1;
}

.empty-state i { font-size: 3rem; margin-bottom: 1rem; display: block; }

/* Context menu */
.context-menu {
    position: fixed;
    background: white;
    border-radius: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    padding: 0.4rem;
    z-index: 10000;
    min-width: 180px;
    display: none;
}

.context-menu button {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    width: 100%;
    padding: 0.5rem 0.75rem;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 0.85rem;
    border-radius: 6px;
    color: #374151;
}

.context-menu button:hover { background: #f3f4f6; }
.context-menu button.danger { color: #ef4444; }
.context-menu button.danger:hover { background: #fef2f2; }

/* Toast */
.toast-container {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 10001;
}

.toast {
    padding: 0.75rem 1.25rem;
    border-radius: 10px;
    color: white;
    font-weight: 500;
    font-size: 0.85rem;
    margin-top: 0.5rem;
    animation: slideIn 0.3s ease;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.toast.success { background: #22c55e; }
.toast.error { background: #ef4444; }

@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

/* Responsive */
@media (max-width: 768px) {
    .content-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    }
    .manager-header {
        flex-direction: column;
        gap: 0.75rem;
        text-align: center;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="manager-container">
    <!-- Header -->
    <div class="manager-header">
        <h1><i class="fas fa-puzzle-piece"></i> Gestionnaire d'Exercices</h1>
        <div class="header-actions">
            <button class="btn-secondary" onclick="createFolder()">
                <i class="fas fa-folder-plus"></i> Nouveau dossier
            </button>
            <a href="{{ url_for('exercises.create') }}" class="btn-primary">
                <i class="fas fa-plus"></i> Nouvel exercice
            </a>
        </div>
    </div>

    <!-- Breadcrumb -->
    <div class="breadcrumb-bar" id="breadcrumb">
        <span class="breadcrumb-item current" onclick="navigateTo(null)">
            <i class="fas fa-home"></i> Racine
        </span>
    </div>

    <!-- Content -->
    <div class="content-grid" id="content-grid">
        <div class="empty-state">
            <i class="fas fa-spinner fa-spin"></i>
            Chargement...
        </div>
    </div>
</div>

<!-- Context menu -->
<div class="context-menu" id="context-menu"></div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>
{% endblock %}

{% block extra_js %}
<script>
let currentFolderId = null;

// ---- Navigation ----
function navigateTo(folderId) {
    currentFolderId = folderId;
    loadContents();
    loadBreadcrumb();
}

async function loadContents() {
    const grid = document.getElementById('content-grid');
    grid.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>';

    try {
        const url = currentFolderId
            ? `/exercises/manager/contents?folder_id=${currentFolderId}`
            : '/exercises/manager/contents';
        const res = await fetch(url);
        const data = await res.json();

        if (!data.success) throw new Error(data.message);

        let html = '';

        // Folders
        data.folders.forEach(f => {
            html += `
                <div class="folder-card" ondblclick="navigateTo(${f.id})" onclick="selectItem(this)"
                     oncontextmenu="showFolderMenu(event, ${f.id}, '${escapeHtml(f.name)}')"
                     data-type="folder" data-id="${f.id}">
                    <div class="folder-actions">
                        <button onclick="event.stopPropagation(); showFolderMenu(event, ${f.id}, '${escapeHtml(f.name)}')" title="Options">
                            <i class="fas fa-ellipsis-v"></i>
                        </button>
                    </div>
                    <i class="fas fa-folder folder-icon" style="--folder-color: ${f.color || '#667eea'}; color: var(--folder-color);"></i>
                    <span class="folder-name">${escapeHtml(f.name)}</span>
                </div>
            `;
        });

        // Exercises
        data.exercises.forEach(e => {
            const badge = e.is_draft
                ? '<span class="exercise-badge badge-draft">Brouillon</span>'
                : '<span class="exercise-badge badge-published">Publié</span>';
            const updated = e.updated_at ? new Date(e.updated_at).toLocaleDateString('fr-FR') : '';

            html += `
                <div class="exercise-card" data-type="exercise" data-id="${e.id}">
                    <i class="fas fa-puzzle-piece exercise-icon"></i>
                    <span class="exercise-title">${escapeHtml(e.title)}</span>
                    ${badge}
                    <div class="exercise-meta">
                        <span><i class="fas fa-cube"></i> ${e.block_count} blocs</span>
                        <span><i class="fas fa-star"></i> ${e.total_points} XP</span>
                        ${updated ? `<span><i class="fas fa-clock"></i> ${updated}</span>` : ''}
                    </div>
                    <div class="exercise-card-actions">
                        <a href="/exercises/${e.id}/edit" title="Modifier"><i class="fas fa-edit"></i> Modifier</a>
                        <a href="/exercises/${e.id}/preview" title="Aperçu"><i class="fas fa-eye"></i></a>
                        <button onclick="deleteExercise(${e.id}, '${escapeHtml(e.title)}')" class="btn-danger" title="Supprimer"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;
        });

        if (!html) {
            html = `
                <div class="empty-state">
                    <i class="fas fa-folder-open"></i>
                    <p>Ce dossier est vide</p>
                    <p style="font-size:0.85rem;">Créez un dossier ou un exercice pour commencer</p>
                </div>
            `;
        }

        grid.innerHTML = html;
    } catch (err) {
        grid.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i><p>Erreur: ${err.message}</p></div>`;
    }
}

async function loadBreadcrumb() {
    const bar = document.getElementById('breadcrumb');
    let html = `<span class="breadcrumb-item ${!currentFolderId ? 'current' : ''}" onclick="navigateTo(null)"><i class="fas fa-home"></i> Racine</span>`;

    if (currentFolderId) {
        try {
            const res = await fetch(`/exercises/manager/breadcrumb?folder_id=${currentFolderId}`);
            const data = await res.json();
            if (data.success && data.breadcrumb) {
                data.breadcrumb.forEach((item, i) => {
                    const isCurrent = i === data.breadcrumb.length - 1;
                    html += `<span class="breadcrumb-sep"><i class="fas fa-chevron-right"></i></span>`;
                    html += `<span class="breadcrumb-item ${isCurrent ? 'current' : ''}" onclick="navigateTo(${item.id})">${escapeHtml(item.name)}</span>`;
                });
            }
        } catch (e) {}
    }

    bar.innerHTML = html;
}

// ---- CRUD operations ----
async function createFolder() {
    const name = prompt('Nom du nouveau dossier :');
    if (!name || !name.trim()) return;

    try {
        const res = await fetch('/exercises/manager/folder/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token() }}' },
            body: JSON.stringify({ name: name.trim(), parent_id: currentFolderId })
        });
        const data = await res.json();
        if (data.success) {
            showToast('Dossier créé', 'success');
            loadContents();
        } else {
            showToast(data.message || 'Erreur', 'error');
        }
    } catch (e) {
        showToast('Erreur réseau', 'error');
    }
}

async function renameFolder(folderId, currentName) {
    const name = prompt('Nouveau nom :', currentName);
    if (!name || !name.trim() || name.trim() === currentName) return;

    try {
        const res = await fetch(`/exercises/manager/folder/${folderId}/rename`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token() }}' },
            body: JSON.stringify({ name: name.trim() })
        });
        const data = await res.json();
        if (data.success) {
            showToast('Dossier renommé', 'success');
            loadContents();
        }
    } catch (e) {
        showToast('Erreur', 'error');
    }
}

async function deleteFolder(folderId, folderName) {
    if (!confirm(`Supprimer le dossier "${folderName}" ? Les exercices qu'il contient seront déplacés à la racine.`)) return;

    try {
        const res = await fetch(`/exercises/manager/folder/${folderId}`, {
            method: 'DELETE',
            headers: { 'X-CSRFToken': '{{ csrf_token() }}' }
        });
        const data = await res.json();
        if (data.success) {
            showToast('Dossier supprimé', 'success');
            loadContents();
        }
    } catch (e) {
        showToast('Erreur', 'error');
    }
}

async function deleteExercise(exerciseId, title) {
    if (!confirm(`Supprimer l'exercice "${title}" ? Cette action est irréversible.`)) return;

    try {
        const res = await fetch(`/exercises/${exerciseId}/delete`, {
            method: 'DELETE',
            headers: { 'X-CSRFToken': '{{ csrf_token() }}' }
        });
        const data = await res.json();
        if (data.success) {
            showToast('Exercice supprimé', 'success');
            loadContents();
        } else {
            showToast(data.message || 'Erreur', 'error');
        }
    } catch (e) {
        showToast('Erreur', 'error');
    }
}

// ---- Context menu ----
function showFolderMenu(event, folderId, folderName) {
    event.preventDefault();
    event.stopPropagation();
    const menu = document.getElementById('context-menu');
    menu.innerHTML = `
        <button onclick="navigateTo(${folderId}); hideContextMenu();"><i class="fas fa-folder-open"></i> Ouvrir</button>
        <button onclick="renameFolder(${folderId}, '${folderName.replace(/'/g, "\\'")}'); hideContextMenu();"><i class="fas fa-pen"></i> Renommer</button>
        <button class="danger" onclick="deleteFolder(${folderId}, '${folderName.replace(/'/g, "\\'")}'); hideContextMenu();"><i class="fas fa-trash"></i> Supprimer</button>
    `;
    menu.style.display = 'block';
    menu.style.left = event.clientX + 'px';
    menu.style.top = event.clientY + 'px';
}

function hideContextMenu() {
    document.getElementById('context-menu').style.display = 'none';
}

document.addEventListener('click', hideContextMenu);

function selectItem(el) {
    document.querySelectorAll('.folder-card, .exercise-card').forEach(c => c.style.borderColor = '#e5e7eb');
    el.style.borderColor = '#667eea';
}

// ---- Utils ----
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function showToast(message, type) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// ---- Init ----
document.addEventListener('DOMContentLoaded', () => {
    loadContents();
});
</script>
{% endblock %}
